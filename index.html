<html lang="en">
  <head>
    <meta charset="utf-8">

    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.gamesforlili.xyz/">
    <meta property="og:title" content="Games for Lili — Healthy Browser Games for Kids">
    <meta property="og:description" content="Games for Lili is an indie game studio building healthy browser games for kids — no ads, no tracking, no dark patterns.">
    <meta property="og:site_name" content="Games for Lili">
    <meta property="og:image" content="https://www.gamesforlili.xyz/logo.png">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Games for Lili — Healthy Browser Games for Kids">
    <meta name="twitter:description" content="Games for Lili is an indie game studio building healthy browser games for kids — no ads, no tracking, no dark patterns.">

    <meta name="twitter:image:alt" content="Games for Lili logo">
    <title>Games for Lili — Healthy Browser Games for Kids</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Games for Lili",
        "url": "https://www.gamesforlili.xyz/",
        "logo": "https://www.gamesforlili.xyz/logo.png",
        "description": "Games for Lili is an indie game studio building healthy browser games for kids — no ads, no tracking, no dark patterns.",
        "sameAs": [
          "https://x.com/slopshipper",
          "https://github.com/reposlayer"
        ]
      }
    </script>
    <style>
      :root {
        color: #fffaf1;
        background: #000;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        background: #000;
        color: #fffaf1;
      }

      .site {
        display: grid;
        min-height: 100vh;
        grid-template-rows: auto 1fr auto;
      }

      .site-header,
      .site-footer {
        width: 100%;
        padding: 18px clamp(18px, 4vw, 48px);
      }

      .site-header {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .brand-link,
      .footer-brand {
        display: inline-flex;
        align-items: center;
        gap: 14px;
      }

      .brand-link {
        border-radius: 999px;
        text-decoration: none;
      }

      .logo-frame {
        display: grid;
        width: 56px;
        height: 56px;
        place-items: center;
        border: 1px solid rgba(255, 250, 241, 0.16);
        border-radius: 18px;
        background: #fff8ec;
        box-shadow: 0 18px 60px rgba(49, 24, 76, 0.28);
      }

      .brand-logo {
        display: block;
        width: auto;
        height: 44px;
        max-width: 44px;
        object-fit: contain;
      }

      .hero {
        display: grid;
        place-items: center;
        padding: 56px 20px;
        text-align: center;
      }

      h1 {
        margin: 0;
        color: #fffaf1;
        font-size: clamp(2.7rem, 10vw, 8rem);
        line-height: 0.95;
        font-weight: 750;
      }

      .site-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        border-top: 1px solid rgba(255, 250, 241, 0.12);
      }

      .footer-logo {
        height: 40px;
        max-width: 40px;
      }

      .footer-name {
        color: #fffaf1;
        font-size: 1rem;
        font-weight: 700;
      }

      .footer-line {
        max-width: 520px;
        margin: 0;
        color: rgba(255, 250, 241, 0.72);
        font-size: 0.95rem;
        line-height: 1.5;
        text-align: right;
      }

      @media (max-width: 640px) {
        .site-header,
        .site-footer {
          padding: 16px 18px;
        }

        .logo-frame {
          width: 48px;
          height: 48px;
          border-radius: 16px;
        }

        .brand-logo {
          height: 36px;
          max-width: 36px;
        }

        .site-footer {
          flex-direction: column;
          align-items: flex-start;
        }

        .footer-logo {
          height: 34px;
          max-width: 34px;
        }

        .footer-line {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <div class="site">
      <header class="site-header">
        <a class="brand-link" href="/" aria-label="Games for Lili home">
          <span class="logo-frame">
            <img class="brand-logo" src="/logo.png" alt="Games for Lili logo" width="1254" height="1254">
          </span>
        </a>
      </header>
      <main class="hero">
        <h1>Games for Lili</h1>
      </main>
      <footer class="site-footer">
        <div class="footer-brand">
          <span class="logo-frame">
            <img class="brand-logo footer-logo" src="/logo.png" alt="Games for Lili logo" width="1254" height="1254">
          </span>
          <span class="footer-name">Games for Lili</span>
        </div>
        <p class="footer-line">Healthy browser games for kids — no ads, no tracking, no dark patterns.</p>
      </footer>
    </div>
  </body>
</html>
